name: pypi

on:
  push:
    tags:
      - "howzat-v*"
  workflow_dispatch:

env:
  # Override repo-level `.cargo/config.toml` (`-C target-cpu=native`) for CI builds so wheels are
  # portable by default.
  RUSTFLAGS: ""

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate release metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re
          import sys
          import tomllib

          def load_toml(path: str) -> dict:
              return tomllib.loads(pathlib.Path(path).read_text(encoding="utf-8"))

          versions = {
              "howzat": load_toml("howzat/Cargo.toml")["package"]["version"],
              "howzat-kit": load_toml("howzat-kit/Cargo.toml")["package"]["version"],
              "howzat-ffi-py": load_toml("howzat-ffi-py/Cargo.toml")["package"]["version"],
          }
          if len(set(versions.values())) != 1:
              print(f"Version mismatch across crates: {versions}", file=sys.stderr)
              raise SystemExit(1)

          pyproject = load_toml("howzat-ffi-py/pyproject.toml")["project"]
          if "version" in pyproject:
              pyproject_version = pyproject["version"]
              ffi_version = versions["howzat-ffi-py"]
              if pyproject_version != ffi_version:
                  print(
                      f"pyproject version {pyproject_version} != Cargo version {ffi_version}",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)
          else:
              dynamic = pyproject.get("dynamic", [])
              if "version" not in dynamic:
                  print(
                      "pyproject must define project.version or dynamic=['version']",
                      file=sys.stderr,
                  )
                  raise SystemExit(1)

          if os.environ["EVENT_NAME"] == "push":
              ref_name = os.environ["REF_NAME"]
              match = re.fullmatch(r"howzat-v(.+)", ref_name)
              if match is None:
                  print(f"Tag {ref_name} must match howzat-v<version>", file=sys.stderr)
                  raise SystemExit(1)
              tag_version = match.group(1)
              ffi_version = versions["howzat-ffi-py"]
              if tag_version != ffi_version:
                  print(f"Tag version {tag_version} != package version {ffi_version}", file=sys.stderr)
                  raise SystemExit(1)

          print(f"Release metadata OK: {versions}")
          PY

  sdist:
    needs: [validate-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        working-directory: howzat-ffi-py
        run: |
          python3 -m pip install -U pip maturin
          rm -rf dist
          maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: howzat-ffi-py/dist/*
          if-no-files-found: error

  wheels:
    needs: [validate-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15-intel, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            clang \
            libasound2 \
            libatk-bridge2.0-0 \
            libcairo2 \
            libcups2 \
            libclang-dev \
            libgbm1 \
            libnss3 \
            libpango-1.0-0 \
            libtool \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            m4 \
            pkg-config
      - name: Install LLVM (macOS)
        if: runner.os == 'macOS'
        run: |
          xcode_toolchain="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain"
          xcode_libclang="${xcode_toolchain}/usr/lib/libclang.dylib"
          brew install llvm
          brew install autoconf automake libtool
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          if [[ -f /Library/Developer/CommandLineTools/usr/lib/libclang.dylib ]]; then
            echo "LIBCLANG_PATH=/Library/Developer/CommandLineTools/usr/lib" >> "$GITHUB_ENV"
          elif [[ -f "${xcode_libclang}" ]]; then
            echo "LIBCLANG_PATH=$(dirname "${xcode_libclang}")" >> "$GITHUB_ENV"
          else
            echo "warning: libclang.dylib not found; relying on bindgen default lookup"
          fi
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        shell: bash
        working-directory: howzat-ffi-py
        run: |
          python3 -m pip install -U pip maturin numpy
          rm -rf dist
          if [ "${RUNNER_OS}" = "Linux" ]; then
            maturin build --profile release-lto --out dist --compatibility pypi
          else
            maturin build --profile release-lto --out dist
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: howzat-ffi-py/dist/*
          if-no-files-found: error

  publish:
    needs: [validate-release, sdist, wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/howzat-v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          name: sdist
          path: dist
      - name: Sanity check sdist (no kompute crates)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          sdists=(dist/howzat-*.tar.gz)
          if [ ${#sdists[@]} -ne 1 ]; then
            echo "Expected exactly one howzat sdist in dist/, found: ${sdists[*]:-<none>}"
            ls -la dist
            exit 1
          fi

          bad="$(
            tar -tzf "${sdists[0]}" \
              | awk -F/ 'NF > 1 { print $2 }' \
              | sort -u \
              | grep -E '^(kompute|komputation)$' \
              || true
          )"
          if [ -n "${bad}" ]; then
            echo "Refusing to publish: sdist contains kompute crates:"
            echo "${bad}"
            exit 1
          fi
      - name: Publish to PyPI (trusted publisher)
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Publish to PyPI (API token)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
